services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: deal_sourcing
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: deal_sourcing
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deal_sourcing"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
